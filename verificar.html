<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de Certificado</title>

    <link rel="stylesheet" href="style.css">

    <style>
        .detalle {
            text-align: left;
            margin-top: 30px;
            font-size: 18px;
        }

        .estado {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .valido {
            color: green;
        }

        .invalido {
            color: red;
        }
    </style>
</head>

<body>

    <div class="container">

        <img src="img/logo-uavsics.png"
             alt="UAVSICS"
             class="logo">

        <div id="contenido">
            Cargando...
        </div>

    </div>

    <script>

        async function validarCertificado() {

            const parametros = new URLSearchParams(window.location.search);
            const id = parametros.get("id");

            const contenedor = document.getElementById("contenido");

            try {

                const respuesta = await fetch("certificados.json");
                const certificados = await respuesta.json();

                const certificado = certificados.find(
                    c => c.id === id
                );

                if (certificado) {

                    contenedor.innerHTML = `
                        <div class="estado valido">
                            ✓ CERTIFICADO VÁLIDO
                        </div>

                        <div class="detalle">
                            <p><strong>Código:</strong> ${certificado.id}</p>
                            <p><strong>Alumno:</strong> ${certificado.alumno}</p>
                            <p><strong>Curso:</strong> ${certificado.curso}</p>
                            <p><strong>Fecha:</strong> ${certificado.fecha}</p>
                            <p><strong>Instructor:</strong> ${certificado.instructor}</p>
                        </div>
                    `;

                } else {

                    contenedor.innerHTML = `
                        <div class="estado invalido">
                            ✗ CERTIFICADO NO ENCONTRADO
                        </div>
                    `;
                }

            } catch (error) {

                console.error(error);

                contenedor.innerHTML = `
                    <div class="estado invalido">
                        Error al cargar la base de datos
                    </div>
                `;
            }
        }

        validarCertificado();

    </script>

</body>

</html>
