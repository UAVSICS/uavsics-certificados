<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de URL</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <img src="img/logo-uavsics.png"
             alt="UAVSICS"
             class="logo">

        <h1>Prueba de recepción de ID</h1>

        <div id="contenido">
            Cargando...
        </div>

    </div>

    <script>

        const parametros = new URLSearchParams(window.location.search);
        const id = parametros.get("id");

        document.getElementById("contenido").innerHTML = `
            <h2>ID recibido:</h2>
            <p style="font-size:24px; font-weight:bold;">${id}</p>
        `;

    </script>

</body>

</html>
