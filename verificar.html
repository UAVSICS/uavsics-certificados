<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="robots" content="noindex, nofollow">

<title>Validación de Certificado UAVSICS</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<div class="container">


<img
src="img/logo-uavsics.png"
alt="UAVSICS"
class="logo"
>


<h1>Validación de Certificado UAVSICS</h1>


<div id="contenido">
Verificando certificado...
</div>


</div>



<script>


// =================================================
// CONFIGURACIÓN DEL REGISTRO DE VALIDACIONES
// =================================================

const URL_REGISTRO_VALIDACIONES =

  "https://script.google.com/macros/s/AKfycbz1LRZ08D9qF9YfZirn-ALUnEajNqhVM0mb5dbt9GoY1QthcDp6YAO-jY_cl29aPMdl/exec";



// =================================================
// REGISTRAR VALIDACIÓN EN SEGUNDO PLANO
// =================================================

function registrarValidacion(
  codigo,
  resultado,
  alumno,
  curso
) {

  try {

    const parametros =
      new URLSearchParams({

        codigo:
          codigo || "",

        resultado:
          resultado || "",

        alumno:
          alumno || "",

        curso:
          curso || ""

      });


    fetch(

      URL_REGISTRO_VALIDACIONES +
      "?" +
      parametros.toString(),

      {

        method: "GET",

        mode: "no-cors",

        cache: "no-store",

        keepalive: true

      }

    )

    .catch(function() {

      // El registro nunca debe interrumpir
      // la validación del certificado.

    });


  } catch (error) {

    // El registro es silencioso.
    // La página continúa funcionando.

  }

}



// =================================================
// OBTENER CÓDIGO DESDE LA URL
// =================================================

const parametros =
  new URLSearchParams(
    window.location.search
  );


const idBuscado =
  parametros.get("id");



// =================================================
// CÓDIGO NO RECIBIDO
// =================================================

if (!idBuscado) {


  document
    .getElementById("contenido")
    .innerHTML = `

      <h2>⚠️ Código no recibido</h2>

      <p>
      No se ingresó un código de certificado válido.
      </p>

    `;


  registrarValidacion(

    "",

    "Código no recibido",

    "",

    ""

  );


} else {



  // =================================================
  // CONSULTAR certificados.json
  // =================================================

  fetch(

    "certificados.json?v=" +
    Date.now()

  )


  .then(function(respuesta) {

    if (!respuesta.ok) {

      throw new Error(
        "No fue posible cargar certificados.json"
      );

    }

    return respuesta.json();

  })


  .then(function(certificados) {



    const certificado =
      certificados.find(

        function(certificadoActual) {

          return (
            String(certificadoActual.id)
              .trim() ===
            String(idBuscado)
              .trim()
          );

        }

      );



    // =================================================
    // CERTIFICADO NO ENCONTRADO
    // =================================================

    if (!certificado) {


      document
        .getElementById("contenido")
        .innerHTML = `

          <h2>❌ Certificado no encontrado</h2>

          <p>
          El código ingresado no corresponde a un
          certificado UAVSICS válido.
          </p>

        `;


      registrarValidacion(

        idBuscado,

        "No encontrado",

        "",

        ""

      );


      return;

    }



    // =================================================
    // CERTIFICADO REVOCADO
    // =================================================

    if (certificado.estado === "Revocado") {


      document
        .getElementById("contenido")
        .innerHTML = `

          <div class="sello-revocado">

            <div class="icono-revocado">
            !
            </div>

            <h2>
            Certificado Revocado
            </h2>

            <p>
            Este certificado fue revocado por UAVSICS.
            </p>

          </div>

          <p>
          <strong>Código Certificado:</strong><br>
          ${certificado.id}
          </p>

        `;


      registrarValidacion(

        certificado.id,

        "Revocado",

        certificado.alumno || "",

        certificado.curso || ""

      );


      return;

    }



    // =================================================
    // CERTIFICADO VÁLIDO
    // =================================================

    document
      .getElementById("contenido")
      .innerHTML = `

        <div class="sello-validado">

          <div class="icono-validado">
          ✓
          </div>

          <h2>
          Certificado Verificado
          </h2>

          <p>
          Este certificado ha sido emitido y
          validado por UAVSICS.
          </p>

        </div>

        <p>
        <strong>ID Certificado:</strong><br>
        ${certificado.id}
        </p>

        <p>
        <strong>Alumno:</strong><br>
        ${certificado.alumno}
        </p>

        <p>
        <strong>Empresa:</strong><br>
        ${certificado.empresa || "No informado"}
        </p>

        <p>
        <strong>Curso:</strong><br>
        ${certificado.curso}
        </p>

        <p>
        <strong>Duración:</strong><br>
        ${certificado.horas || "No informado"} horas
        </p>

        <p>
        <strong>Fecha de emisión:</strong><br>
        ${certificado.fecha}
        </p>

        <p>
        <strong>Instructor:</strong><br>
        ${certificado.instructor}
        </p>

        <p class="aviso-documento">
        La validación confirma la autenticidad del registro
        emitido por UAVSICS. La copia oficial del certificado
        es entregada directamente al titular.
        </p>

      `;


    registrarValidacion(

      certificado.id,

      "Válido",

      certificado.alumno || "",

      certificado.curso || ""

    );



  })


  // =================================================
  // ERROR AL CONSULTAR certificados.json
  // =================================================

  .catch(function(error) {


    document
      .getElementById("contenido")
      .innerHTML = `

        <h2>⚠️ Error de conexión</h2>

        <p>
        No fue posible verificar el certificado.
        </p>

      `;


    registrarValidacion(

      idBuscado,

      "Error de conexión",

      "",

      ""

    );


    console.error(
      "Error al verificar el certificado:",
      error
    );


  });


}


</script>


</body>

</html>
